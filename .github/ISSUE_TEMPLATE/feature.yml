name: Feature request
description: Propose a focused charting, contract, URL, or integration improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What charting or integration problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed public behavior
      description: Include any contract, URL-compatibility, or licensing impact.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request is charting-related and does not require accounts, chat, video, tracking, billing, or a database.
          required: true
