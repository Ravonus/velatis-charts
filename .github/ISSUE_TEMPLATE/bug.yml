name: Bug report
description: Report a reproducible charting, API, URL, or self-hosting defect.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you. Use synthetic birth data and remove secrets before submitting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node, pnpm, OS, browser, CPU architecture, and deployment method.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps and synthetic chart state.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
